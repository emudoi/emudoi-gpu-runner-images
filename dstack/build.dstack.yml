type: task
name: build-llm-runner-image

# Kaniko builds OCI images without a Docker daemon — works inside dstack
# runners (which are themselves containers, no privileged mode).
image: gcr.io/kaniko-project/executor:debug

# On-demand, beefy. Build runs 3-6x/year — spot interruption would cost
# more in wasted time than the ~$0.50/hr saved. No GPU needed for kaniko.
# If Runpod's dstack integration doesn't expose CPU-only offers, add
# `gpu: 1` (idle GPU on cheap instance, acceptable).
resources:
  cpu: 16..
  memory: 32GB..
  disk: 200GB

backends: [runpod]
regions: [EU-RO-1]

spot_policy: on-demand
max_price: 5.0

max_duration: 2h
retry:
  on_events: [no-capacity, error]
  duration: 30m

env:
  - HF_TOKEN           # from Airflow Variable
  - GIT_PAT            # GHCR push credential (needs write:packages scope)
  - MODEL_NAME         # e.g. "Qwen/Qwen2.5-7B-Instruct" — from DAG param
  - IMAGE_TAG=latest   # optional override; vllm-version tag also auto-added

commands:
  - |
    # Derive image slug from model name: drop org prefix, lowercase.
    # "Qwen/Qwen2.5-7B-Instruct" -> "qwen2.5-7b-instruct"
    IMAGE_SLUG=$(echo "${MODEL_NAME#*/}" | tr '[:upper:]' '[:lower:]')
    IMAGE_NAME="ghcr.io/emudoi/${IMAGE_SLUG}"
    echo "MODEL_NAME=${MODEL_NAME}"
    echo "IMAGE_NAME=${IMAGE_NAME}"
    echo "IMAGE_TAG=${IMAGE_TAG}"
    # Export for subsequent steps in the same `|` block (each command is
    # a separate shell, so we write to a file the next step sources).
    echo "export IMAGE_NAME=${IMAGE_NAME}" > /tmp/build_env
    echo "export IMAGE_SLUG=${IMAGE_SLUG}" >> /tmp/build_env
  - |
    # Build docker config.json for GHCR auth.
    mkdir -p /kaniko/.docker
    AUTH=$(echo -n "emudoi:${GIT_PAT}" | base64 -w0)
    cat > /kaniko/.docker/config.json <<EOF
    {
      "auths": {
        "ghcr.io": {
          "auth": "${AUTH}"
        }
      }
    }
    EOF
  - |
    source /tmp/build_env
    # Run kaniko. --context=. uses the dstack-uploaded repo root.
    # --snapshot-mode=redo is more memory-efficient for large model layers.
    # --image-name-with-digest captures the final digest for the user.
    /kaniko/executor \
      --dockerfile=Dockerfile \
      --context=. \
      --destination="${IMAGE_NAME}:${IMAGE_TAG}" \
      --build-arg=MODEL_NAME="${MODEL_NAME}" \
      --build-arg=HF_TOKEN="${HF_TOKEN}" \
      --snapshot-mode=redo \
      --cache=true \
      --cache-repo="${IMAGE_NAME}/cache" \
      --image-name-with-digest=/tmp/image-digest.txt
  - |
    source /tmp/build_env
    echo "=============================================="
    echo "BUILT IMAGE DIGEST:"
    cat /tmp/image-digest.txt
    echo "=============================================="
    echo "Image pullable at: ${IMAGE_NAME}:${IMAGE_TAG}"
